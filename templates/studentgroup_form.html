{% extends 'base.html' %}

{% block title %}{% if group %}Edit{% else %}Add{% endif %} Student Group{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h2 class="mb-1" style="color: #1a1a2e; font-weight: 700;">{% if group %}Edit{% else %}Add{% endif %} Student Group</h2>
    </div>
</div>
<div class="card border-0 shadow-sm">
    <div class="card-body p-4">
        <form method="post">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" style="color: #1a1a2e; font-weight: 500;">Group Name</label>
                    <input type="text" name="name" class="form-control" value="{{ group.name|default:'' }}" placeholder="e.g., CSE-A" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label" style="color: #1a1a2e; font-weight: 500;">Department</label>
                    <select name="department" class="form-select" required>
                        {% for dept in departments %}
                        <option value="{{ dept.pk }}" {% if group.department.pk == dept.pk %}selected{% endif %}>{{ dept.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label" style="color: #1a1a2e; font-weight: 500;">Year</label>
                    <select name="year" class="form-select" required>
                        <option value="1" {% if group.year == 1 %}selected{% endif %}>Year 1</option>
                        <option value="2" {% if group.year == 2 %}selected{% endif %}>Year 2</option>
                        <option value="3" {% if group.year == 3 %}selected{% endif %}>Year 3</option>
                        <option value="4" {% if group.year == 4 %}selected{% endif %}>Year 4</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label" style="color: #1a1a2e; font-weight: 500;">Semester</label>
                    <select name="semester" class="form-select" required>
                        {% for i in "12345678" %}
                        <option value="{{ i }}" {% if group.semester|add:0 == i|add:0 %}selected{% endif %}>Semester {{ i }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label" style="color: #1a1a2e; font-weight: 500;">Semester Type</label>
                    <select name="semester_type" class="form-select" required>
                        <option value="odd" {% if group.semester_type == 'odd' %}selected{% endif %}>Odd Semester</option>
                        <option value="even" {% if group.semester_type == 'even' %}selected{% endif %}>Even Semester</option>
                    </select>
                </div>
            </div>
            <div class="mt-3">
                <button type="submit" class="btn btn-primary px-4">Save</button>
                <a href="{% url 'studentgroup_list' %}" class="btn btn-secondary px-4">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

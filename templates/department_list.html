{% extends 'base.html' %}

{% block title %}Departments{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0" style="color: #1a1a2e; font-weight: 700;">Departments</h2>
    <a href="{% url 'department_add' %}" class="btn btn-primary"><i class="bi bi-plus me-1"></i> Add Department</a>
</div>
<div class="card border-0 shadow-sm">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>Name</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for dept in departments %}
                    <tr>
                        <td><strong>{{ dept.code }}</strong></td>
                        <td>{{ dept.name }}</td>
                        <td>
                            <a href="{% url 'department_edit' dept.pk %}" class="btn btn-sm" style="background-color: #f77f00; color: white;"><i class="bi bi-pencil"></i></a>
                            <a href="{% url 'department_delete' dept.pk %}" class="btn btn-sm btn-danger" onclick="return confirm('Delete this department?')"><i class="bi bi-trash"></i></a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr><td colspan="3" class="text-center py-4">No departments found</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

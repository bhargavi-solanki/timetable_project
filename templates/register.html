{% extends 'base.html' %}

{% block login_content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Timetable Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        
        body {
            background-color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
        }
        
        .register-card {
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 35px;
            max-width: 420px;
            width: 100%;
        }
        
        .register-logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #f77f00, #e07000);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        
        .register-logo i {
            font-size: 28px;
            color: white;
        }
        
        h3 {
            color: #1a1a2e;
            font-weight: 700;
            font-size: 24px;
        }
        
        .subtitle {
            color: #6c757d;
            font-size: 14px;
            margin-bottom: 25px;
        }
        
        .form-label {
            color: #1a1a2e;
            font-weight: 500;
            font-size: 14px;
        }
        
        .form-control, .form-select {
            border-radius: 8px;
            padding: 11px 14px;
            border: 1px solid #e0e0e0;
            transition: all 0.2s;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: #4361ee;
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
        }
        
        .btn-primary {
            background-color: #f77f00;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
        }
        
        .btn-primary:hover {
            background-color: #e07000;
        }
        
        .login-link {
            color: #4361ee;
            text-decoration: none;
            font-weight: 500;
        }
        
        .login-link:hover {
            color: #3451db;
        }
        
        .form-check-input:checked {
            background-color: #4361ee;
            border-color: #4361ee;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="register-logo">
            <i class="bi bi-person-plus"></i>
        </div>
        <h3 class="text-center">Create Account</h3>
        <p class="subtitle text-center">Register to get started</p>
        
        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password1" class="form-control" placeholder="Create a password" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="password2" class="form-control" placeholder="Confirm your password" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Register As</label>
                <select name="user_type" class="form-select">
                    <option value="user">Faculty/Staff</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                Create Account
            </button>
        </form>
        <p class="text-center mt-4 mb-0" style="color: #6c757d;">Already have an account? <a href="{% url 'login' %}" class="login-link">Login</a></p>
    </div>
</body>
</html>
{% endblock %}

{% extends 'base.html' %}

{% block title %}Add Assignment{% endblock %}

{% block content %}
<h2 class="mb-4">Add Course Assignment</h2>
<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Course</label>
                <select name="course" class="form-select" required>
                    {% for c in courses %}
                    <option value="{{ c.pk }}">{{ c.code }} - {{ c.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Student Group</label>
                <select name="student_group" class="form-select" required>
                    {% for g in groups %}
                    <option value="{{ g.pk }}">{{ g.name }} - Year {{ g.year }} Sem {{ g.semester }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Faculty</label>
                <select name="faculty" class="form-select" required>
                    {% for f in faculty %}
                    <option value="{{ f.pk }}">{{ f.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% url 'assignment_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}

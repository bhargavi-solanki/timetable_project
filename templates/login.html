{% extends 'base.html' %}

{% block login_content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Timetable Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        
        body {
            background-color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-card {
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 400px;
            width: 100%;
        }
        
        .login-logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #4361ee, #3451db);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        
        .login-logo i {
            font-size: 28px;
            color: white;
        }
        
        h3 {
            color: #1a1a2e;
            font-weight: 700;
            font-size: 24px;
        }
        
        .subtitle {
            color: #6c757d;
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        .form-label {
            color: #1a1a2e;
            font-weight: 500;
            font-size: 14px;
        }
        
        .form-control {
            border-radius: 8px;
            padding: 12px 14px;
            border: 1px solid #e0e0e0;
            transition: all 0.2s;
        }
        
        .form-control:focus {
            border-color: #4361ee;
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
        }
        
        .btn-primary {
            background-color: #4361ee;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
        }
        
        .btn-primary:hover {
            background-color: #3451db;
        }
        
        .register-link {
            color: #4361ee;
            text-decoration: none;
            font-weight: 500;
        }
        
        .register-link:hover {
            color: #3451db;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <i class="bi bi-calendar-check"></i>
        </div>
        <h3 class="text-center">Welcome Back</h3>
        <p class="subtitle text-center">Sign in to continue</p>
        
        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                Sign In
            </button>
        </form>
        <p class="text-center mt-4 mb-0" style="color: #6c757d;">Don't have an account? <a href="{% url 'register' %}" class="register-link">Register</a></p>
    </div>
</body>
</html>
{% endblock %}

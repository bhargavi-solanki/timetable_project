{% extends 'base.html' %}

{% block title %}{% if faculty %}Edit{% else %}Add{% endif %} Faculty{% endblock %}

{% block content %}
<h2 class="mb-4">{% if faculty %}Edit{% else %}Add{% endif %} Faculty</h2>
<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" name="name" class="form-control" value="{{ faculty.name|default:'' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" value="{{ faculty.email|default:'' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Phone</label>
                <input type="text" name="phone" class="form-control" value="{{ faculty.phone|default:'' }}">
            </div>
            <div class="mb-3">
                <label class="form-label">Department</label>
                <select name="department" class="form-select" required>
                    {% for dept in departments %}
                    <option value="{{ dept.pk }}" {% if faculty.department.pk == dept.pk %}selected{% endif %}>{{ dept.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Available Days</label>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="available_days" value="monday" id="mon" {% if 'monday' in faculty.available_days %}checked{% endif %}>
                    <label class="form-check-label" for="mon">Monday</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="available_days" value="tuesday" id="tue" {% if 'tuesday' in faculty.available_days %}checked{% endif %}>
                    <label class="form-check-label" for="tue">Tuesday</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="available_days" value="wednesday" id="wed" {% if 'wednesday' in faculty.available_days %}checked{% endif %}>
                    <label class="form-check-label" for="wed">Wednesday</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="available_days" value="thursday" id="thu" {% if 'thursday' in faculty.available_days %}checked{% endif %}>
                    <label class="form-check-label" for="thu">Thursday</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="available_days" value="friday" id="fri" {% if 'friday' in faculty.available_days %}checked{% endif %}>
                    <label class="form-check-label" for="fri">Friday</label>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% url 'faculty_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}

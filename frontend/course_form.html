{% extends 'base.html' %}

{% block title %}{% if course %}Edit{% else %}Add{% endif %} Course{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h2 class="mb-1" style="color: #1a1a2e; font-weight: 700;">{% if course %}Edit{% else %}Add{% endif %} Course</h2>
    </div>
</div>
<div class="card border-0 shadow-sm">
    <div class="card-body p-4">
        <form method="post">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" style="color: #1a1a2e; font-weight: 500;">Course Code</label>
                    <input type="text" name="code" class="form-control" value="{{ course.code|default:'' }}" placeholder="e.g., CS101" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label" style="color: #1a1a2e; font-weight: 500;">Course Name</label>
                    <input type="text" name="name" class="form-control" value="{{ course.name|default:'' }}" placeholder="e.g., Data Structures" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label" style="color: #1a1a2e; font-weight: 500;">Credit Hours</label>
                    <input type="number" name="credit_hours" class="form-control" value="{{ course.credit_hours|default:3 }}" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label" style="color: #1a1a2e; font-weight: 500;">Course Type</label>
                    <select name="course_type" class="form-select" required>
                        <option value="theory" {% if course.course_type == 'theory' %}selected{% endif %}>Theory</option>
                        <option value="practical" {% if course.course_type == 'practical' %}selected{% endif %}>Practical</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label" style="color: #1a1a2e; font-weight: 500;">Department</label>
                    <select name="department" class="form-select" required>
                        {% for dept in departments %}
                        <option value="{{ dept.pk }}" {% if course.department.pk == dept.pk %}selected{% endif %}>{{ dept.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label" style="color: #1a1a2e; font-weight: 500;">Assigned Faculty</label>
                <select name="assigned_faculty" class="form-select">
                    <option value="">-- Select Faculty --</option>
                    {% for f in faculty %}
                    <option value="{{ f.pk }}" {% if course.assigned_faculty.pk == f.pk %}selected{% endif %}>{{ f.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mt-3">
                <button type="submit" class="btn btn-primary px-4">Save</button>
                <a href="{% url 'course_list' %}" class="btn btn-secondary px-4">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block title %}Faculty{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0" style="color: #1a1a2e; font-weight: 700;">Faculty</h2>
    <a href="{% url 'faculty_add' %}" class="btn btn-primary"><i class="bi bi-plus me-1"></i> Add Faculty</a>
</div>
<div class="card border-0 shadow-sm">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Department</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for f in faculty %}
                    <tr>
                        <td><strong>{{ f.name }}</strong></td>
                        <td>{{ f.email }}</td>
                        <td>{{ f.phone }}</td>
                        <td>{{ f.department.name }}</td>
                        <td>
                            <a href="{% url 'faculty_edit' f.pk %}" class="btn btn-sm" style="background-color: #f77f00; color: white;"><i class="bi bi-pencil"></i></a>
                            <a href="{% url 'faculty_delete' f.pk %}" class="btn btn-sm btn-danger" onclick="return confirm('Delete this faculty?')"><i class="bi bi-trash"></i></a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr><td colspan="5" class="text-center py-4">No faculty found</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block title %}{% if classroom %}Edit{% else %}Add{% endif %} Classroom{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h2 class="mb-1" style="color: #1a1a2e; font-weight: 700;">{% if classroom %}Edit{% else %}Add{% endif %} Classroom</h2>
    </div>
</div>
<div class="card border-0 shadow-sm">
    <div class="card-body p-4">
        <form method="post">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" style="color: #1a1a2e; font-weight: 500;">Room Name</label>
                    <input type="text" name="name" class="form-control" value="{{ classroom.name|default:'' }}" placeholder="e.g., Room 101" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label" style="color: #1a1a2e; font-weight: 500;">Building</label>
                    <input type="text" name="building" class="form-control" value="{{ classroom.building|default:'' }}" placeholder="e.g., Block A" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" style="color: #1a1a2e; font-weight: 500;">Capacity</label>
                    <input type="number" name="capacity" class="form-control" value="{{ classroom.capacity|default:'' }}" placeholder="e.g., 60" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label" style="color: #1a1a2e; font-weight: 500;">Room Type</label>
                    <select name="room_type" class="form-select" required>
                        <option value="lecture" {% if classroom.room_type == 'lecture' %}selected{% endif %}>Lecture Hall</option>
                        <option value="lab" {% if classroom.room_type == 'lab' %}selected{% endif %}>Laboratory</option>
                        <option value="computer_lab" {% if classroom.room_type == 'computer_lab' %}selected{% endif %}>Computer Lab</option>
                    </select>
                </div>
            </div>
            <div class="mt-3">
                <button type="submit" class="btn btn-primary px-4">Save</button>
                <a href="{% url 'classroom_list' %}" class="btn btn-secondary px-4">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

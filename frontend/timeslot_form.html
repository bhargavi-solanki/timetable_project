{% extends 'base.html' %}

{% block title %}{% if timeslot %}Edit{% else %}Add{% endif %} Time Slot{% endblock %}

{% block content %}
<h2 class="mb-4">{% if timeslot %}Edit{% else %}Add{% endif %} Time Slot</h2>
<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Day</label>
                <select name="day" class="form-select" required>
                    <option value="monday" {% if timeslot.day == 'monday' %}selected{% endif %}>Monday</option>
                    <option value="tuesday" {% if timeslot.day == 'tuesday' %}selected{% endif %}>Tuesday</option>
                    <option value="wednesday" {% if timeslot.day == 'wednesday' %}selected{% endif %}>Wednesday</option>
                    <option value="thursday" {% if timeslot.day == 'thursday' %}selected{% endif %}>Thursday</option>
                    <option value="friday" {% if timeslot.day == 'friday' %}selected{% endif %}>Friday</option>
                    <option value="saturday" {% if timeslot.day == 'saturday' %}selected{% endif %}>Saturday</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Start Time</label>
                <input type="time" name="start_time" class="form-control" value="{{ timeslot.start_time|default:'09:00' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">End Time</label>
                <input type="time" name="end_time" class="form-control" value="{{ timeslot.end_time|default:'10:00' }}" required>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" name="is_break" id="is_break" {% if timeslot.is_break %}checked{% endif %}>
                <label class="form-check-label" for="is_break">Is Break</label>
            </div>
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% url 'timeslot_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}

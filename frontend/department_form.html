{% extends 'base.html' %}

{% block title %}{% if department %}Edit{% else %}Add{% endif %} Department{% endblock %}

{% block content %}
<h2 class="mb-4">{% if department %}Edit{% else %}Add{% endif %} Department</h2>
<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Department Code</label>
                <input type="text" name="code" class="form-control" value="{{ department.code|default:'' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Department Name</label>
                <input type="text" name="name" class="form-control" value="{{ department.name|default:'' }}" required>
            </div>
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% url 'department_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
